<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baro Ki'Teer Predictor</title>
<style>
  :root {
    --bg-deep: #0b0e1a;
    --bg-panel: #141a2e;
    --border: #2a3358;
    --accent: #7f5af0;
    --accent-soft: #b8a6f7;
    --text: #e6e6f0;
    --text-dim: #9198b8;
    --good: #4fd6a8;
    --warn: #f0b64f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(ellipse at top, #1b2246 0%, var(--bg-deep) 55%),
      var(--bg-deep);
    background-attachment: fixed;
  }

  header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(20, 26, 46, 0.6);
    backdrop-filter: blur(6px);
  }

  header .glyph {
    font-size: 1.6rem;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  header h1 {
    font-size: 1.15rem;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  header p {
    margin: 0;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  button.action {
    flex: 1 1 220px;
    padding: 0.9rem 1.2rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-panel), #10152880);
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }

  button.action:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  button.action:active { transform: translateY(0); }

  .item-search {
    display: none;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .item-search.visible { display: flex; }

  .input-wrapper {
    position: relative;
    flex: 1;
  }

  .item-search input {
    width: 100%;
    padding: 0.7rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text);
    font-size: 0.95rem;
  }

  .item-search input:focus { outline: 2px solid var(--accent); }

  .item-search button {
    padding: 0.7rem 1.1rem;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #0b0e1a;
    font-weight: 700;
    cursor: pointer;
  }

  .autocomplete-list {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .autocomplete-list.visible { display: block; }

  .autocomplete-item {
    padding: 0.55rem 0.9rem;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .autocomplete-item:hover,
  .autocomplete-item.active {
    background: rgba(127, 90, 240, 0.2);
  }

  .panel {
    border: 1px solid var(--border);
    background: var(--bg-panel);
    border-radius: 12px;
    padding: 1.25rem 1.4rem;
    min-height: 3rem;
  }

  .panel.hidden { display: none; }

  .panel .placeholder { color: var(--text-dim); font-size: 0.9rem; }

  .disclaimer {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 1rem;
    line-height: 1.4;
  }

  table.results {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  table.results th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 600;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  table.results td {
    padding: 0.45rem 0.5rem;
    border-bottom: 1px solid #1e2544;
  }

  .prob-bar {
    display: inline-block;
    height: 6px;
    border-radius: 3px;
    background: var(--accent);
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  .category-tag {
    font-size: 0.72rem;
    color: var(--accent-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.1rem 0.5rem;
  }

  .item-message {
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .status-predicted { color: var(--good); }
  .status-overdue { color: var(--warn); font-weight: 600; }
  .status-insufficient_data { color: var(--text-dim); }
  .status-discontinued { color: #e56b6b; }
  .status-always_available { color: var(--accent-soft); }

  .spinner {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <div class="glyph">🜁</div>
  <div>
    <h1>Baro Ki'Teer Predictor</h1>
    <p>Estimated shop odds &amp; item return windows, from historical rotation data</p>
  </div>
</header>

<main>
  <div class="actions">
    <button class="action" id="btn-next-visit">🔮 Predict Next Visit</button>
    <button class="action" id="btn-check-item">🔍 Check an Item</button>
  </div>

  <div class="item-search" id="item-search">
    <div class="input-wrapper">
      <input type="text" id="item-input" placeholder="e.g. Prisma Gorgon" autocomplete="off">
      <div class="autocomplete-list" id="autocomplete-list"></div>
    </div>
    <button id="item-search-go">Search</button>
  </div>

  <div class="panel hidden" id="results-panel">
    <div class="placeholder">Pick an action above to see results.</div>
  </div>
</main>

<script>
const panel = document.getElementById('results-panel');
const itemSearch = document.getElementById('item-search');
const itemInput = document.getElementById('item-input');

function showPanel(html) {
  panel.classList.remove('hidden');
  panel.innerHTML = html;
}

function showSpinner(label) {
  showPanel(`<div class="spinner">${label}...</div>`);
}

document.getElementById('btn-next-visit').addEventListener('click', async () => {
  itemSearch.classList.remove('visible');
  showSpinner('Fitting hazard curve');
  try {
    const res = await fetch('/api/predict/next-visit');
    const data = await res.json();
    renderNextVisit(data);
  } catch (err) {
    showPanel(`<div class="item-message status-discontinued">Failed to load prediction: ${err}</div>`);
  }
});

document.getElementById('btn-check-item').addEventListener('click', () => {
  itemSearch.classList.add('visible');
  itemInput.focus();
});

document.getElementById('item-search-go').addEventListener('click', runItemSearch);

// --- autocomplete ---
const autocompleteList = document.getElementById('autocomplete-list');
let autocompleteTimer = null;
let activeIndex = -1;

itemInput.addEventListener('input', () => {
  clearTimeout(autocompleteTimer);
  const q = itemInput.value.trim();
  if (!q) { hideAutocomplete(); return; }
  autocompleteTimer = setTimeout(() => fetchSuggestions(q), 150);
});

itemInput.addEventListener('keydown', (e) => {
  const items = autocompleteList.querySelectorAll('.autocomplete-item');
  if (autocompleteList.classList.contains('visible') && items.length) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActiveSuggestion((activeIndex + 1) % items.length, items);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActiveSuggestion((activeIndex - 1 + items.length) % items.length, items);
      return;
    }
    if (e.key === 'Enter' && activeIndex >= 0) {
      e.preventDefault();
      selectSuggestion(items[activeIndex].textContent);
      return;
    }
    if (e.key === 'Escape') {
      hideAutocomplete();
      return;
    }
  }
  if (e.key === 'Enter') runItemSearch();
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.input-wrapper')) hideAutocomplete();
});

async function fetchSuggestions(q) {
  try {
    const res = await fetch(`/api/items/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderSuggestions(data.items);
  } catch (err) {
    hideAutocomplete();
  }
}

function renderSuggestions(names) {
  activeIndex = -1;
  if (!names.length) { hideAutocomplete(); return; }
  autocompleteList.innerHTML = names
    .map(name => `<div class="autocomplete-item">${name}</div>`)
    .join('');
  autocompleteList.classList.add('visible');
  autocompleteList.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault(); // keep input focus, avoid blur-before-click race
      selectSuggestion(el.textContent);
    });
  });
}

function setActiveSuggestion(index, items) {
  items.forEach(el => el.classList.remove('active'));
  items[index].classList.add('active');
  items[index].scrollIntoView({ block: 'nearest' });
  activeIndex = index;
}

function selectSuggestion(name) {
  itemInput.value = name;
  hideAutocomplete();
  runItemSearch();
}

function hideAutocomplete() {
  autocompleteList.classList.remove('visible');
  autocompleteList.innerHTML = '';
  activeIndex = -1;
}

async function runItemSearch() {
  const name = itemInput.value.trim();
  if (!name) return;
  showSpinner(`Looking up ${name}`);
  try {
    const res = await fetch(`/api/predict/item/${encodeURIComponent(name)}`);
    if (res.status === 404) {
      const data = await res.json();
      showPanel(`<div class="item-message status-discontinued">${data.detail}</div>`);
      return;
    }
    const data = await res.json();
    renderItemResult(data);
  } catch (err) {
    showPanel(`<div class="item-message status-discontinued">Failed to load item: ${err}</div>`);
  }
}

function renderNextVisit(data) {
  const maxProb = Math.max(...data.items.map(i => i.probability));
  const rows = data.items.map(item => {
    const barWidth = Math.round((item.probability / maxProb) * 60);
    return `<tr>
      <td><span class="prob-bar" style="width:${barWidth}px"></span>${item.probability.toFixed(3)}</td>
      <td>${item.name}</td>
      <td><span class="category-tag">${item.category}</span></td>
      <td>${item.visits_since_last} visits ago</td>
    </tr>`;
  }).join('');

  showPanel(`
    <div class="disclaimer">
      Candidate shortlist (${data.count} items), quota-bounded per category and ranked by estimated
      likelihood. Not a guaranteed offering list — which specific due item Baro picks within a
      category has genuine randomness this model can't fully resolve.
    </div>
    <table class="results">
      <thead><tr><th>Probability</th><th>Item</th><th>Category</th><th>Last seen</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `);
}

function renderItemResult(data) {
  showPanel(`<div class="item-message status-${data.status}">${data.message}</div>`);
}
</script>

</body>
</html>
